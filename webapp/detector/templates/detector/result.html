{% load static %}

<html data-bs-theme="light">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-body">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <button id="theme-toggle" type="button" class="btn btn-outline-secondary mb-3">
                        Dark Mode
                    </button>
                    <div class="card shadow p-4">
                        <h1 class="text-center mb-4">Analysis Result</h1>
                        <p>
                            <strong>File: </strong>
                            {{ filename }}
                        </p>
                        {% if prediction == "Fake" %}
                            <div class="alert alert-danger">
                                <h2 class="mb-0">Fake</h2>
                            </div>
                        {% elif prediction == "Real" %}
                            <div class="alert alert-success">
                                <h2 class="mb-0">Real</h2>
                            </div>
                        {% else %}
                            <div class="alert alert-warning">
                                <h2 class="mb-0">{{ prediction }}</h2>
                            </div>
                        {% endif %}
                        <div class="chart-container mx-auto mt-4" style="width: 100%; max-width: 700px; height: 400px;  margin: auto;">
                            <canvas
                                id="predictionChart"
                                data-fake-prob="{{ probability|default:0 }}">
                            </canvas>
                        </div>
                        <p class="text-muted">
                            Decision threshold: 99.93%
                        </p>
                        <a href="/" class="btn btn-primary w-100">Try another video</a>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="{% static 'detector/js/script.js' %}"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
