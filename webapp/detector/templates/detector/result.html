{% load static %}

<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow p-4">
                        <h1 class="text-center mb-4">Analysis Result</h1>
                        <p>
                            <strong>File: </strong>
                            {{ filename }}
                        </p>
                        {% if prediction == "Fake" %}
                            <div class="alert alert-danger">
                                <h2 class="mb-0">Fake</h2>
                            </div>
                        {% elif prediction == "Real" %}
                            <div class="alert alert-success">
                                <h2 class="mb-0">Real</h2>
                            </div>
                        {% else %}
                            <div class="alert alert-warning">
                                <h2 class="mb-0">{{ prediction }}</h2>
                            </div>
                        {% endif %}
                        <p class="fs-5 mt-3"> 
                            <strong>Probability of video being fake: </strong>
                            {{ probability }}%
                        </p>
                        <a href="/" class="btn btn-primary w-100">Try another video</a>
                    </div>
                </div>
            </div>
        </div>
        <script src="{% static 'detector/js/script.js' %}"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
