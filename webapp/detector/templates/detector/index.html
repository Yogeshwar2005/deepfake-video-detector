{% load static %}

<html data-bs-theme="light">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body class="bg-body">
        
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <button id="theme-toggle" type="button" class="btn btn-outline-secondary mb-3">
                        Dark Mode
                    </button>
                    <div class="card shadow p-4">
                        <h1 class="text-center mb-4">Deepfake video detector</h1>
                        <form method ="post" enctype="multipart/form-data" id="upload-form">

                            {% if error %}
                                <div class="alert alert-danger"> {{error}}</div>
                            {% endif %}

                            {% csrf_token %}
                            {{form.as_p}}

                            <video id="video-preview"
                                    class="w-100 mt-3 rounded shadow-sm"
                                    controls
                                    style="display: none;">
                            </video>

                            <button type="submit" id="detect-btn" class="btn btn-primary w-100 mt-2">Detect</button>
                            <div id="spinner" style="display: none" class="text-center mt-3">
                                <div class="spinner-border text-primary" role="status"></div>
                            </div>
                            <a href="{% url 'history' %}" class="btn btn-outline-secondary w-100 mt-3">
                                View Prediction History
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{% static 'detector/js/script.js' %}"></script>
    </body>
    
</html>
